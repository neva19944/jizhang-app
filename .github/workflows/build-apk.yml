name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build web app
      run: npm run build
    
    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli@6
    
    - name: Add Android platform (fresh)
      run: |
        npx cap add android || echo "Android platform already exists"
        npx cap sync android
    
    - name: Fix Android SDK version (use stable versions)
      run: |
        # 使用稳定的 SDK 版本
        sed -i 's/compileSdkVersion = 36/compileSdkVersion = 34/' android/variables.gradle
        sed -i 's/targetSdkVersion = 36/targetSdkVersion = 34/' android/variables.gradle
        sed -i 's/minSdkVersion = 24/minSdkVersion = 22/' android/variables.gradle
        # 使用稳定的 Gradle 版本
        sed -i 's/gradle-8.14.3-all.zip/gradle-8.2.1-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
        # 使用稳定的 Android Gradle Plugin 版本
        sed -i "s/com.android.tools.build:gradle:8.13.0/com.android.tools.build:gradle:8.2.2/" android/build.gradle
        # 修复 Java 版本
        sed -i 's/VERSION_21/VERSION_17/g' android/app/capacitor.build.gradle
        cat android/variables.gradle
        cat android/gradle/wrapper/gradle-wrapper.properties
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build Android APK
      working-directory: android
      run: ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: List APK files (debug)
      run: find android -name "*.apk" -type f
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jizhang-app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error
